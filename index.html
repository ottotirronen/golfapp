<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Golf App</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <meta name="theme-color" content="#121212" />
    <link rel="icon" href="assets/img/icon-192.png" />
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="hole-par-row">
          <div class="hole-par-item">
            <span class="hole-par-label">Väylä</span>
            <span id="holeNumberValue" class="hole-par-value">-</span>
          </div>
          <div class="hole-par-divider"></div>
          <div class="hole-par-item">
            <span class="hole-par-label">Par</span>
            <span id="holeParValue" class="hole-par-value">-</span>
          </div>
        </div>

        <hr class="section-divider" />

        <div class="distance-section">
          <h3 class="distance-title">Etäisyys viheriölle</h3>
          <div class="distance-value">
            <span id="spinner" class="loader" style="display: none"></span>
            <div id="distanceDisplay">
              <span id="distanceStatus">-</span>
              <div id="distanceTriplet" class="distance-triplet hidden">
                <div id="distanceFrontItem" class="distance-item distance-side">
                  <span class="distance-label">Etu</span>
                  <span id="distanceFront" class="distance-number">-</span>
                </div>
                <div class="distance-item distance-main">
                  <span class="distance-label distance-label-main">Keski</span>
                  <span id="distanceCenter" class="distance-number">-</span>
                </div>
                <div id="distanceBackItem" class="distance-item distance-side">
                  <span class="distance-label">Taka</span>
                  <span id="distanceBack" class="distance-number">-</span>
                </div>
              </div>
              <div id="distanceUnit" class="distance-unit hidden">metriä</div>
            </div>
          </div>
        </div>

        <hr class="section-divider" />

        <div class="course-select-wrapper">
          <div id="courseSelector" class="course-select-row">
            <span class="course-select-label">Kenttä</span>
            <span id="courseSelectorValue" class="course-select-value"
              >Valitse kenttä</span
            >
          </div>
          <ul id="courseList" class="dropdown hidden" role="listbox"></ul>
        </div>
      </div>

      <div class="button-row">
        <button id="prevHole" class="button">&#8592;</button>
        <button id="calculateBtn" class="button">NÄYTÄ ETÄISYYS</button>
        <button id="nextHole" class="button">&#8594;</button>
      </div>
    </main>

    <!-- footer -->
    <footer>
      <small>
        <a href="about.html" target="_blank">Tietoa</a> |
        <span>Copyright <span id="copyrightYear"></span></span>

        <!-- <a href="#">Ehdota kenttää</a> -->
      </small>
    </footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
